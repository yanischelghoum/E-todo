networks:
  etodo_network:
    driver: bridge

volumes:
  db_data:

services:
  db:
    image: mysql:8.4
    container_name: etodo_db
    ports:
      - "3306:3306"
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - etodo_network    
    restart: unless-stopped
    command: --mysql-native-password=ON
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  backend:
    depends_on:
      db:
        condition: service_healthy
    build: 
      context: ./backend
      dockerfile: dockerfile
    container_name: backend
    ports:
      - "3000:3000"
    env_file: ".env"
    networks:
      - etodo_network
    restart: unless-stopped
  
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db
    networks:
      - etodo_network

  frontend:
    depends_on:
      - backend    
    build: 
      context: ./frontend
      dockerfile: dockerfile
    container_name: etodo_frontend
    ports:
      - "8080:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    networks:
      - etodo_network
    restart: unless-stopped

